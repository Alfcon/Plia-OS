<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Plia-OS</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0d0d0d; color: #e0e0e0; display: flex; height: 100vh; }
    aside { width: 300px; padding: 16px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
    h2 { font-size: 0.85rem; text-transform: uppercase; color: #888; margin-bottom: 6px; }
    #status-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; background: #1a1a2e; color: #4fc3f7; display: inline-block; }
    .msg { padding: 8px 10px; border-radius: 6px; max-width: 80%; margin-bottom: 4px; font-size: 0.9rem; }
    .msg.user { background: #1e3a5f; align-self: flex-end; }
    .msg.assistant { background: #1a1a1a; border: 1px solid #333; }
    .msg.tool { background: #1a2e1a; border: 1px solid #2e4d2e; font-size: 0.8rem; color: #a5d6a7; }
    label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 4px; }
    select, input[type=range], input[type=number] { width: 100%; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: 4px 6px; }
    input[type=file] { width: 100%; font-size: 0.75rem; color: #e0e0e0; }
    button { background: #1e3a5f; color: #e0e0e0; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem; width: 100%; }
    button:hover { background: #2a4d7a; }
    #module-list { font-size: 0.8rem; }
    #module-list li { padding: 3px 0; border-bottom: 1px solid #222; color: #aaa; }
    #module-list li span { color: #4fc3f7; }
    .ref-status { font-size: 0.75rem; color: #4fc3f7; margin: 2px 0 6px; min-height: 1em; }
    #vram-bar { padding: 8px 10px; border-bottom: 1px solid #333; font-size: 0.75rem; cursor: pointer; }
    #vram-bar .vram-row { display: flex; align-items: center; gap: 8px; }
    #vram-bar .vram-track { flex: 1; height: 5px; background: #333; border-radius: 3px; overflow: hidden; }
    #vram-bar .vram-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    #vram-bar .vram-fill.normal { background: #4ade80; }
    #vram-bar .vram-fill.studio { background: #7c3aed; }
    #vram-bar-detail { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #222; }
    #vram-bar.studio-mode { border-color: #7c3aed; }
    #vram-bar-detail .model-row { display: flex; justify-content: space-between; padding: 2px 0; color: #aaa; }
    #vram-bar-detail .model-row .model-name { color: #ccc; }
    #vram-done-btn { width: 100%; margin-top: 8px; background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
    #vram-done-btn:hover { background: #991b1b; }
    #vram-pipeline-toggle { display: flex; gap: 4px; margin-top: 6px; font-size: 0.7rem; }
    #vram-pipeline-toggle button { width: auto; padding: 3px 8px; font-size: 0.7rem; }
    #vram-pipeline-toggle button.active { background: #1e3a5f; }
  </style>
</head>
<body>

<aside>
  <!-- VRAM Status Bar -->
  <div id="vram-bar" onclick="toggleVramDetail()">
    <div class="vram-row">
      <span id="vram-dot" style="font-size:0.9rem;">●</span>
      <span id="vram-label" style="color:#888;">VRAM</span>
      <div class="vram-track">
        <div id="vram-fill" class="vram-fill normal" style="width:0%"></div>
      </div>
      <span id="vram-text" style="color:#555;">— GB</span>
      <span id="vram-chevron" style="color:#555;">▼</span>
    </div>
    <div id="vram-bar-detail">
      <div id="vram-model-list"></div>
<button id="vram-done-btn" style="display:none" onclick="releaseStudioModel(event)">✓ Done</button>
    </div>
  </div>
  <!-- Status -->
  <section>
    <h2>Status</h2>
    <span id="status-badge">armed</span>
  </section>

  <!-- Voice Controls -->
  <section>
    <h2>Voice</h2>
    <label>Engine
      <select id="tts-engine" onchange="onEngineChange()">
        <option value="kokoro">Kokoro</option>
        <option value="chatterbox">Chatterbox</option>
        <option value="dramabox">Dramabox</option>
      </select>
    </label>

    <!-- Kokoro-specific -->
    <div id="kokoro-controls">
      <label>Voice
        <select id="kokoro-voice">
          <option value="af_heart">af_heart (US Female)</option>
          <option value="am_michael">am_michael (US Male)</option>
          <option value="bf_emma">bf_emma (UK Female)</option>
          <option value="bm_george">bm_george (UK Male)</option>
        </select>
      </label>
      <label>Speed
        <input type="range" id="kokoro-speed" min="0.5" max="2.0" step="0.1" value="1.0" />
      </label>
    </div>

    <!-- Chatterbox-specific -->
    <div id="chatterbox-controls" style="display:none">
      <label>Reference Voice (5–10 sec WAV/MP3)
        <input type="file" id="cb-ref-file" accept="audio/*" onchange="uploadReferenceAudio()" />
      </label>
      <div id="cb-ref-status" class="ref-status"></div>
      <div style="display:flex;gap:6px;margin:4px 0;">
        <button id="cb-record-btn" onclick="startRecording()" style="width:auto;padding:6px 10px;">Record</button>
        <button id="cb-stop-btn" onclick="stopRecording()" style="display:none;width:auto;padding:6px 10px;">Stop</button>
        <span id="cb-timer" style="display:none;font-size:0.75rem;color:#4fc3f7;align-self:center;"></span>
      </div>
      <canvas id="cb-meter" width="120" height="10" style="display:none;margin-bottom:4px;border-radius:2px;background:#1a1a1a;"></canvas>
      <label>Exaggeration
        <input type="range" id="cb-exag" min="0" max="1" step="0.05" value="0.5" />
      </label>
      <label>CFG Weight <span style="font-size:0.7rem;color:#555;">— voice ref strength</span>
        <input type="range" id="cb-cfg" min="0" max="1" step="0.05" value="0.5" />
      </label>
      <label>Temperature <span style="font-size:0.7rem;color:#555;">— sampling creativity</span>
        <input type="range" id="cb-temp" min="0.1" max="2.0" step="0.05" value="0.8" />
      </label>
      <label>Seed <span style="font-size:0.7rem;color:#555;">— blank = random each time</span></label>
      <div style="display:flex;gap:6px;margin-bottom:6px;">
        <input type="number" id="cb-seed" placeholder="random" style="flex:1;" />
        <button onclick="randomiseCbSeed()" style="width:auto;padding:6px 8px;">🎲</button>
      </div>
    </div>

    <!-- Dramabox-specific -->
    <div id="dramabox-controls" style="display:none">
      <label>Reference Voice (5–10 sec WAV/MP3)
        <input type="file" id="db-ref-file" accept="audio/*" onchange="uploadDbReferenceAudio()" />
      </label>
      <div id="db-ref-status" class="ref-status"></div>
      <div style="display:flex;gap:6px;margin:4px 0;">
        <button id="db-record-btn" onclick="startDbRecording()" style="width:auto;padding:6px 10px;">Record</button>
        <button id="db-stop-btn" onclick="stopDbRecording()" style="display:none;width:auto;padding:6px 10px;">Stop</button>
        <span id="db-timer" style="display:none;font-size:0.75rem;color:#4fc3f7;align-self:center;"></span>
      </div>
      <canvas id="db-meter" width="120" height="10" style="display:none;margin-bottom:4px;border-radius:2px;background:#1a1a1a;"></canvas>
      <label>CFG Scale
        <input type="range" id="db-cfg" min="1.0" max="5.0" step="0.1" value="2.5" />
      </label>
      <label>STG Scale
        <input type="range" id="db-stg" min="0.0" max="3.0" step="0.1" value="1.5" />
      </label>
      <label>Seed
        <input type="number" id="db-seed" value="42" min="0" style="width:100%" />
      </label>

      <hr style="border-color:#333;margin:8px 0;" />
      <h2>Generate Clip</h2>
      <label>Prompt
        <textarea id="db-prompt" rows="4"
          style="width:100%;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;padding:4px 6px;font-family:monospace;resize:vertical;"
          placeholder='A woman speaks warmly, "Welcome to Plia."'></textarea>
      </label>
      <button id="db-generate-btn" onclick="generateDramaboxClip()">Generate</button>
      <div id="db-progress" style="display:none;font-size:0.75rem;color:#4fc3f7;margin:4px 0;"></div>
      <div id="db-result" style="display:none;margin-top:6px;">
        <audio id="db-audio" controls style="width:100%;margin-bottom:4px;"></audio>
        <a id="db-download" download style="font-size:0.75rem;color:#4fc3f7;">Download</a>
      </div>
    </div>

    <button onclick="applyVoiceConfig()">Apply</button>
  </section>

  <!-- Modules -->
  <section>
    <h2>Modules</h2>
    <ul id="module-list">Loading...</ul>
  </section>
</aside>

<main id="conversation">
  <!-- Messages injected here by WebSocket -->
</main>

<script>
  let _recTimerInterval = null;
  let _recTimerSeconds = 0;
  let _recAudioCtx = null;
  let _recMeterRaf = null;
  let _recStream = null;

  let _dbRecTimerInterval = null;
  let _dbRecTimerSeconds = 0;
  let _dbRecAudioCtx = null;
  let _dbRecMeterRaf = null;
  let _dbRecStream = null;

  const ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'status') {
      document.getElementById('status-badge').textContent = msg.state;
    }
    if (msg.type === 'transcript') {
      const div = document.createElement('div');
      div.className = `msg ${msg.role}`;
      div.textContent = msg.text;
      document.getElementById('conversation').appendChild(div);
      div.scrollIntoView();
    }
    if (msg.type === 'wake') {
      document.getElementById('status-badge').textContent = 'listening';
    }
    if (msg.type === 'dramabox_progress') {
      const el = document.getElementById('db-progress');
      if (el) el.textContent = `Generating… chunk ${msg.chunk} / ${msg.total} (est. ${msg.est_duration_s}s)`;
    }
    if (msg.type === 'vram_status') {
      updateVramBar(msg);
    }
  };

  // Load tool list
  fetch('/api/tools')
    .then(r => r.json())
    .then(tools => {
      const ul = document.getElementById('module-list');
      ul.innerHTML = Object.entries(tools)
        .map(([name, desc]) => `<li><span>${name}</span> — ${desc}</li>`)
        .join('');
    });

  // Load current config into controls
  fetch('/api/config')
    .then(r => r.json())
    .then(cfg => {
      document.getElementById('tts-engine').value = cfg.tts_engine;
      document.getElementById('kokoro-voice').value = cfg.kokoro_voice;
      document.getElementById('kokoro-speed').value = cfg.kokoro_speed;
      document.getElementById('cb-exag').value = cfg.chatterbox_exaggeration;
      if (cfg.chatterbox_cfg_weight !== undefined)
        document.getElementById('cb-cfg').value = cfg.chatterbox_cfg_weight;
      if (cfg.chatterbox_temperature !== undefined)
        document.getElementById('cb-temp').value = cfg.chatterbox_temperature;
      if (cfg.chatterbox_seed !== null && cfg.chatterbox_seed !== undefined)
        document.getElementById('cb-seed').value = cfg.chatterbox_seed;
      if (cfg.chatterbox_reference_audio) {
        const name = cfg.chatterbox_reference_audio.split('/').pop();
        document.getElementById('cb-ref-status').textContent = `Current: ${name}`;
      }
      document.getElementById('db-cfg').value = cfg.dramabox_cfg_scale;
      document.getElementById('db-stg').value = cfg.dramabox_stg_scale;
      document.getElementById('db-seed').value = cfg.dramabox_seed;
      if (cfg.dramabox_voice_ref) {
        const name = cfg.dramabox_voice_ref.split('/').pop();
        document.getElementById('db-ref-status').textContent = `Current: ${name}`;
      }
      onEngineChange();
      startVramPolling();
    });

  function onEngineChange() {
    const engine = document.getElementById('tts-engine').value;
    document.getElementById('kokoro-controls').style.display = engine === 'kokoro' ? '' : 'none';
    document.getElementById('chatterbox-controls').style.display = engine === 'chatterbox' ? '' : 'none';
    document.getElementById('dramabox-controls').style.display = engine === 'dramabox' ? '' : 'none';
  }

  async function uploadDbReferenceAudio() {
    const fileInput = document.getElementById('db-ref-file');
    const file = fileInput.files[0];
    if (!file) return;
    const status = document.getElementById('db-ref-status');
    status.textContent = 'Uploading…';
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/api/upload-reference-audio?target=dramabox', { method: 'POST', body: form });
    if (res.ok) {
      const data = await res.json();
      status.textContent = `Loaded: ${data.filename}`;
    } else {
      status.textContent = 'Upload failed';
    }
  }

  async function uploadReferenceAudio() {
    const fileInput = document.getElementById('cb-ref-file');
    const file = fileInput.files[0];
    if (!file) return;
    const status = document.getElementById('cb-ref-status');
    status.textContent = 'Uploading…';
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/api/upload-reference-audio', { method: 'POST', body: form });
    if (res.ok) {
      const data = await res.json();
      status.textContent = `Loaded: ${data.filename}`;
    } else {
      status.textContent = 'Upload failed';
    }
  }

  function applyVoiceConfig() {
    const payload = {
      tts_engine: document.getElementById('tts-engine').value,
      kokoro_voice: document.getElementById('kokoro-voice').value,
      kokoro_speed: parseFloat(document.getElementById('kokoro-speed').value),
      chatterbox_exaggeration: parseFloat(document.getElementById('cb-exag').value),
      chatterbox_cfg_weight: parseFloat(document.getElementById('cb-cfg').value),
      chatterbox_temperature: parseFloat(document.getElementById('cb-temp').value),
      chatterbox_seed: (() => { const v = document.getElementById('cb-seed').value.trim(); return v === '' ? null : parseInt(v, 10); })(),
      dramabox_cfg_scale: parseFloat(document.getElementById('db-cfg').value),
      dramabox_stg_scale: parseFloat(document.getElementById('db-stg').value),
      dramabox_seed: parseInt(document.getElementById('db-seed').value, 10),
    };
    fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
  }

  async function startRecording() {
    document.getElementById('cb-record-btn').disabled = true;
    const statusEl = document.getElementById('cb-ref-status');
    const res = await fetch('/api/start-recording', { method: 'POST' });
    if (!res.ok) {
      document.getElementById('cb-record-btn').disabled = false;
      statusEl.textContent = 'Failed to start recording';
      return;
    }

    // Timer
    _recTimerSeconds = 0;
    const timerEl = document.getElementById('cb-timer');
    timerEl.textContent = 'Recording… 0:00';
    timerEl.style.display = '';
    _recTimerInterval = setInterval(() => {
      _recTimerSeconds++;
      const m = Math.floor(_recTimerSeconds / 60);
      const s = String(_recTimerSeconds % 60).padStart(2, '0');
      timerEl.textContent = `Recording… ${m}:${s}`;
    }, 1000);

    // Level meter (mic permission for visual only; silently skip if denied)
    try {
      _recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      _recAudioCtx = new AudioContext();
      const analyser = _recAudioCtx.createAnalyser();
      analyser.fftSize = 256;
      _recAudioCtx.createMediaStreamSource(_recStream).connect(analyser);
      const canvas = document.getElementById('cb-meter');
      canvas.style.display = '';
      const ctx2d = canvas.getContext('2d');
      const dataArr = new Uint8Array(analyser.frequencyBinCount);
      const drawMeter = () => {
        _recMeterRaf = requestAnimationFrame(drawMeter);
        analyser.getByteFrequencyData(dataArr);
        const level = dataArr.reduce((a, b) => a + b, 0) / dataArr.length / 255;
        ctx2d.fillStyle = '#1a1a1a';
        ctx2d.fillRect(0, 0, canvas.width, canvas.height);
        ctx2d.fillStyle = '#4caf50';
        ctx2d.fillRect(0, 0, canvas.width * level, canvas.height);
      };
      drawMeter();
    } catch (_) { /* mic denied — recording still proceeds server-side */ }

    document.getElementById('cb-record-btn').style.display = 'none';
    document.getElementById('cb-stop-btn').style.display = '';
  }

  async function startDbRecording() {
    document.getElementById('db-record-btn').disabled = true;
    const statusEl = document.getElementById('db-ref-status');
    const res = await fetch('/api/start-recording', { method: 'POST' });
    if (!res.ok) {
      document.getElementById('db-record-btn').disabled = false;
      statusEl.textContent = 'Failed to start recording';
      return;
    }
    _dbRecTimerSeconds = 0;
    const timerEl = document.getElementById('db-timer');
    timerEl.textContent = 'Recording… 0:00';
    timerEl.style.display = '';
    _dbRecTimerInterval = setInterval(() => {
      _dbRecTimerSeconds++;
      const m = Math.floor(_dbRecTimerSeconds / 60);
      const s = String(_dbRecTimerSeconds % 60).padStart(2, '0');
      timerEl.textContent = `Recording… ${m}:${s}`;
    }, 1000);
    try {
      _dbRecStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      _dbRecAudioCtx = new AudioContext();
      const analyser = _dbRecAudioCtx.createAnalyser();
      analyser.fftSize = 256;
      _dbRecAudioCtx.createMediaStreamSource(_dbRecStream).connect(analyser);
      const canvas = document.getElementById('db-meter');
      canvas.style.display = '';
      const ctx2d = canvas.getContext('2d');
      const dataArr = new Uint8Array(analyser.frequencyBinCount);
      const drawMeter = () => {
        _dbRecMeterRaf = requestAnimationFrame(drawMeter);
        analyser.getByteFrequencyData(dataArr);
        const level = dataArr.reduce((a, b) => a + b, 0) / dataArr.length / 255;
        ctx2d.fillStyle = '#1a1a1a';
        ctx2d.fillRect(0, 0, canvas.width, canvas.height);
        ctx2d.fillStyle = '#4caf50';
        ctx2d.fillRect(0, 0, canvas.width * level, canvas.height);
      };
      drawMeter();
    } catch (_) {}
    document.getElementById('db-record-btn').style.display = 'none';
    document.getElementById('db-stop-btn').style.display = '';
  }

  async function stopDbRecording() {
    clearInterval(_dbRecTimerInterval);
    _dbRecTimerInterval = null;
    document.getElementById('db-timer').style.display = 'none';
    if (_dbRecMeterRaf) { cancelAnimationFrame(_dbRecMeterRaf); _dbRecMeterRaf = null; }
    if (_dbRecStream) { _dbRecStream.getTracks().forEach(t => t.stop()); _dbRecStream = null; }
    if (_dbRecAudioCtx) { _dbRecAudioCtx.close().catch(() => {}); _dbRecAudioCtx = null; }
    document.getElementById('db-meter').style.display = 'none';
    document.getElementById('db-stop-btn').disabled = true;
    const statusEl = document.getElementById('db-ref-status');
    statusEl.textContent = 'Saving…';
    const res = await fetch('/api/stop-recording?target=dramabox', { method: 'POST' });
    document.getElementById('db-record-btn').style.display = '';
    document.getElementById('db-stop-btn').style.display = 'none';
    document.getElementById('db-stop-btn').disabled = false;
    if (res.ok) {
      const data = await res.json();
      statusEl.textContent = `Loaded: ${data.filename}`;
    } else {
      statusEl.textContent = 'Stop failed';
    }
  }

  async function generateDramaboxClip() {
    const prompt = document.getElementById('db-prompt').value.trim();
    if (!prompt) return;
    const btn = document.getElementById('db-generate-btn');
    const progressEl = document.getElementById('db-progress');
    const resultEl = document.getElementById('db-result');
    btn.disabled = true;
    progressEl.textContent = 'Generating…';
    progressEl.style.display = '';
    resultEl.style.display = 'none';

    const payload = {
      prompt,
      seed: parseInt(document.getElementById('db-seed').value, 10),
    };
    const res = await fetch('/api/generate-dramabox', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });

    btn.disabled = false;
    if (res.ok) {
      const data = await res.json();
      progressEl.style.display = 'none';
      const audioEl = document.getElementById('db-audio');
      audioEl.src = `/uploads/${data.filename}`;
      document.getElementById('db-download').href = `/uploads/${data.filename}`;
      document.getElementById('db-download').textContent = `Download ${data.filename}`;
      resultEl.style.display = '';
    } else {
      progressEl.textContent = 'Generation failed — check server logs';
    }
  }

  async function stopRecording() {
    // Tear down timer
    clearInterval(_recTimerInterval);
    _recTimerInterval = null;
    document.getElementById('cb-timer').style.display = 'none';

    // Tear down level meter
    if (_recMeterRaf) { cancelAnimationFrame(_recMeterRaf); _recMeterRaf = null; }
    if (_recStream) { _recStream.getTracks().forEach(t => t.stop()); _recStream = null; }
    if (_recAudioCtx) { _recAudioCtx.close().catch(() => {}); _recAudioCtx = null; }
    document.getElementById('cb-meter').style.display = 'none';

    // Disable stop button during save (keep it visible until response returns)
    document.getElementById('cb-stop-btn').disabled = true;

    // Call backend
    const statusEl = document.getElementById('cb-ref-status');
    statusEl.textContent = 'Saving…';
    const res = await fetch('/api/stop-recording', { method: 'POST' });

    // Restore buttons after response
    document.getElementById('cb-record-btn').style.display = '';
    document.getElementById('cb-stop-btn').style.display = 'none';
    document.getElementById('cb-stop-btn').disabled = false;

    if (res.ok) {
      const data = await res.json();
      statusEl.textContent = `Loaded: ${data.filename}`;
    } else {
      statusEl.textContent = 'Stop failed';
    }
  }

  // --- VRAM Status Bar ---
  let _vramDetailOpen = false;
  let _vramPollInterval = null;
  let _activeHeavyModel = null;

  function toggleVramDetail() {
    _vramDetailOpen = !_vramDetailOpen;
    document.getElementById('vram-bar-detail').style.display = _vramDetailOpen ? 'block' : 'none';
    document.getElementById('vram-chevron').textContent = _vramDetailOpen ? '▲' : '▼';
  }

  function updateVramBar(data) {
    const fill = document.getElementById('vram-fill');
    const dot = document.getElementById('vram-dot');
    const label = document.getElementById('vram-label');
    const text = document.getElementById('vram-text');
    const bar = document.getElementById('vram-bar');
    const doneBtn = document.getElementById('vram-done-btn');

    const total = data.vram_total_gb || 0;
    const used = data.vram_used_gb || 0;
    const pct = total > 0 ? Math.min(100, (used / total) * 100) : 0;

    fill.style.width = pct + '%';
    text.textContent = total > 0 ? `${used.toFixed(1)} / ${total.toFixed(1)} GB` : '— GB';

    _activeHeavyModel = data.active_heavy || null;

    if (data.studio_mode) {
      fill.className = 'vram-fill studio';
      dot.style.color = '#f59e0b';
      label.textContent = 'STUDIO';
      label.style.color = '#a78bfa';
      bar.classList.add('studio-mode');
      doneBtn.style.display = 'block';
      doneBtn.textContent = `✓ Done — Release ${(_activeHeavyModel || 'engine').charAt(0).toUpperCase() + (_activeHeavyModel || 'engine').slice(1)}`;
      if (!_vramDetailOpen) {
        _vramDetailOpen = true;
        document.getElementById('vram-bar-detail').style.display = 'block';
        document.getElementById('vram-chevron').textContent = '▲';
      }
    } else {
      fill.className = 'vram-fill normal';
      dot.style.color = '#4ade80';
      label.textContent = 'VRAM';
      label.style.color = '#888';
      bar.classList.remove('studio-mode');
      doneBtn.style.display = 'none';
    }

    const list = document.getElementById('vram-model-list');
    list.innerHTML = '';
    for (const [name, info] of Object.entries(data.models || {})) {
      const row = document.createElement('div');
      row.className = 'model-row';
      const stateColor = info.state === 'gpu' ? '#4ade80' : info.state === 'cpu' ? '#f59e0b' : '#555';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'model-name';
      nameSpan.style.color = stateColor;
      nameSpan.textContent = `● ${name}`;
      const stateSpan = document.createElement('span');
      stateSpan.textContent = info.state === 'gpu' ? `${info.vram_gb.toFixed(2)} GB GPU` : info.state;
      row.appendChild(nameSpan);
      row.appendChild(stateSpan);
      list.appendChild(row);
    }
  }

  async function pollVramStatus() {
    try {
      const r = await fetch('/api/vram/status');
      if (r.ok) updateVramBar(await r.json());
    } catch (_) {}
  }

  function randomiseCbSeed() {
    document.getElementById('cb-seed').value = Math.floor(Math.random() * 2147483647);
  }

  function startVramPolling() {
    if (_vramPollInterval) return;
    pollVramStatus();
    _vramPollInterval = setInterval(pollVramStatus, 5000);
  }

  async function releaseStudioModel(e) {
    e.stopPropagation();
    if (!_activeHeavyModel) return;
    const btn = document.getElementById('vram-done-btn');
    btn.disabled = true;
    btn.textContent = 'Releasing…';
    try {
      await fetch('/api/vram/release', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: _activeHeavyModel}),
      });
      await pollVramStatus();
      const cfg = await fetch('/api/config').then(r => r.json());
      document.getElementById('tts-engine').value = cfg.tts_engine || 'kokoro';
      onEngineChange();
    } catch (err) {
      console.error('Release failed:', err);
      await pollVramStatus();
    } finally {
      btn.disabled = false;
    }
  }

  async function setStudioPipeline(mode, e) {
    e.stopPropagation();
    await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({studio_pipeline_mode: mode}),
    });
    document.getElementById('vram-pl-active').classList.toggle('active', mode === 'cpu_stt');
    document.getElementById('vram-pl-pause').classList.toggle('active', mode === 'pause');
  }

  window.addEventListener('beforeunload', () => {
    if (_recTimerInterval || _dbRecTimerInterval) {
      fetch('/api/stop-recording', { method: 'POST', keepalive: true });
    }
  });
</script>

</body>
</html>
